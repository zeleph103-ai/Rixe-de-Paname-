        (function(){
            // Block right-click everywhere
            document.addEventListener('contextmenu', e => e.preventDefault());
            // Block F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
            document.addEventListener('keydown', e => {
                const k = e.key;
                const ctrl = e.ctrlKey || e.metaKey;
                if(
                    k === 'F12' ||
                    (ctrl && e.shiftKey && (k === 'I' || k === 'J' || k === 'C')) ||
                    (ctrl && k === 'u' && !e.shiftKey) ||
                    (ctrl && e.shiftKey && k === 'i')
                ) {
                    e.preventDefault();
                    return false;
                }
            });
            // Override devtools check
            setInterval(function(){
                const d = document.createElement('div');
                Object.defineProperty(d, 'id', {get: function(){

    function saveProfiles(arr) { localStorage.setItem(_hidden.profiles, JSON.stringify(arr)); }

    // ===== UI HELPERS =====
    function esc(s) { if(!s) return ''; return String(s).replace(/[&<>]/g, function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];}); }
    function fmtDate(iso) { if(!iso) return 'inconnue'; try { return new Date(iso).toLocaleDateString('fr-FR'); } catch(e) { return iso; } }

    function toast(msg) {
        const el = document.getElementById('toastMsg');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3200);
    }

    // ===== RENDER FICHES =====
    let currentSearchQuery = "";

    function renderCards() {
        const container = document.getElementById('cardsContainer');
        let profiles = getProfiles();
        let filtered = [...profiles];
        if(currentSearchQuery.trim() !== '') {
            const q = currentSearchQuery.trim().toLowerCase();
            filtered = profiles.filter(p =>
                (p.pseudo && p.pseudo.toLowerCase().includes(q)) ||
                (p.firstName && p.firstName.toLowerCase().includes(q)) ||
                (p.lastName && p.lastName.toLowerCase().includes(q)) ||
                (p.identifier && p.identifier.toLowerCase().includes(q)) ||
                (p.email && p.email.toLowerCase().includes(q)) ||
                (p.phone && p.phone.includes(q))
            );
        }
        if(!filtered.length) {
            container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#666;">❌ AUCUNE FICHE</div>';
            document.getElementById('totalCount').innerHTML = '0 fiches';
            return;
        }
        container.innerHTML = filtered.map(p => {
            const parentBlock = p.parentName ? `
                <div class="info-row"><span class="info-label">Parent :</span><span class="info-value">${esc(p.parentName)}</span></div>
                <div class="info-row"><span class="info-label">Email parent :</span><span class="info-value">${esc(p.parentEmail)}</span></div>
            ` : '';
            let mergedHtml = '';
            if(p.mergedIds && p.mergedIds.length) {
                const tags = p.mergedIds.map(id => `<span class="merged-id" style="background:#151515;padding:0.2rem 0.6rem;border-radius:1rem;font-size:0.65rem;font-family:monospace;color:#b0b0b0;">${esc(id)}</span>`).join('');
                mergedHtml = `<div class="merged-section" style="margin-top:0.8rem;background:#030303;border-radius:1rem;padding:0.5rem 0.8rem;"><div style="font-size:0.65rem;color:#999;margin-bottom:6px;">🔗 FUSIONS (${p.mergedCount})</div><div style="display:flex;flex-wrap:wrap;gap:6px;">${tags}</div></div>`;
            }
            const idx = profiles.indexOf(p);
            return `<div class="profile-card">
                <div class="card-header">
                    <span class="pseudo">@${esc(p.pseudo)}</span>
                    <span style="display:flex;gap:6px;align-items:center;">
                        <span class="badge-local">LOCAL</span>
                        <span class="provider-tag">${esc(p.provider)}</span>
                    </span>
                </div>
                <div class="card-body">
                    <div class="info-row"><span class="info-label">Identifiant :</span><span class="info-value">${esc(p.identifier)}</span></div>
                    <div class="info-row"><span class="info-label">Nom complet :</span><span class="info-value">${esc(p.lastName)} ${esc(p.firstName)}</span></div>
                    <div class="info-row"><span class="info-label">Naissance :</span><span class="info-value">${fmtDate(p.birth)} (${p.gender==='M'?'M':'F'})</span></div>
                    <div class="info-row"><span class="info-label">Adresse :</span><span class="info-value">${esc(p.street)}${p.complement ? ', '+esc(p.complement):''}, ${esc(p.postal)} ${esc(p.city)}</span></div>
                    <div class="info-row"><span class="info-label">Contact :</span><span class="info-value">${esc(p.email)} / ${esc(p.phone)}</span></div>
                    <div class="info-row"><span class="info-label">Matricule :</span><span class="info-value">${esc(p.matricule)}</span></div>
                    <div class="info-row"><span class="info-label">Allocataire :</span><span class="info-value">${esc(p.allocataire)}</span></div>
                    ${parentBlock}
                    ${mergedHtml}
                    <div class="card-actions">
                        <button class="edit-btn" data-idx="${idx}">✎ MODIFIER</button>
                        <button class="del-btn" data-idx="${idx}">✕ SUPPRIMER</button>
                    </div>
                </div>
            </div>`;
        }).join('');
        document.getElementById('totalCount').innerHTML = `${filtered.length} fiches`;

        document.querySelectorAll('.del-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const idx = parseInt(this.dataset.idx);
                let profiles = getProfiles();
                if(idx >= 0 && idx < profiles.length) {
                    const name = profiles[idx].pseudo || profiles[idx].firstName;
                    if(confirm(`Supprimer @${name} ?`)) {
                        profiles.splice(idx, 1);
                        saveProfiles(profiles);
                        renderCards();
                        toast(`@${name} supprimé`);
                    }
                }
            });
        });
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const idx = parseInt(this.dataset.idx);
                let profiles = getProfiles();
                if(idx >= 0 && idx < profiles.length) {
                    const p = profiles[idx];
                    document.getElementById('addPseudo').value = p.pseudo || '';
                    document.getElementById('addIdent').value = p.identifier || '';
                    document.getElementById('addProvider').value = p.provider || '';
                    document.getElementById('addNom').value = p.lastName || '';
                    document.getElementById('addPrenom').value = p.firstName || '';
                    document.getElementById('addBirth').value = p.birth || '';
                    document.getElementById('addGender').value = p.gender || '';
                    document.getElementById('addStreet').value = p.street || '';
                    document.getElementById('addComp').value = p.complement || '';
                    document.getElementById('addCp').value = p.postal || '';
                    document.getElementById('addVille').value = p.city || '';
                    document.getElementById('addEmail').value = p.email || '';
                    document.getElementById('addPhone').value = p.phone || '';
                    document.getElementById('addMatricule').value = p.matricule || '';
                    document.getElementById('addAlloc').value = p.allocataire || '';
                    document.getElementById('addParent').value = p.parentName || '';
                    document.getElementById('addParentEmail').value = p.parentEmail || '';
                    document.getElementById('addFicheBtn').dataset.editIdx = idx;
                    document.getElementById('addFicheBtn').textContent = '✎ METTRE À JOUR';
                    toast(`Édition @${p.pseudo}`);
                }
            });
        });
    }

    // ===== ADD / UPDATE =====
    document.getElementById('addFicheBtn').addEventListener('click', function() {
        const editIdx = this.dataset.editIdx;
        const obj = {
            pseudo: document.getElementById('addPseudo').value.trim(),
            identifier: document.getElementById('addIdent').value.trim(),
            provider: document.getElementById('addProvider').value.trim() || 'MANUEL',
            lastName: document.getElementById('addNom').value.trim(),
            firstName: document.getElementById('addPrenom').value.trim(),
            birth: document.getElementById('addBirth').value,
            gender: document.getElementById('addGender').value.trim().toUpperCase() || 'M',
            street: document.getElementById('addStreet').value.trim(),
            complement: document.getElementById('addComp').value.trim(),
            postal: document.getElementById('addCp').value.trim(),
            city: document.getElementById('addVille').value.trim(),
            email: document.getElementById('addEmail').value.trim(),
            phone: document.getElementById('addPhone').value.trim(),
            matricule: document.getElementById('addMatricule').value.trim(),
            allocataire: document.getElementById('addAlloc').value.trim(),
            parentName: document.getElementById('addParent').value.trim(),
            parentEmail: document.getElementById('addParentEmail').value.trim(),
            mergedCount: 0,
            mergedIds: []
        };
        if(!obj.pseudo && !obj.firstName && !obj.lastName) { toast('❗ Remplissez pseudo ou nom'); return; }
        let profiles = getProfiles();
        if(editIdx !== undefined && editIdx !== '') {
            const idx = parseInt(editIdx);
            if(idx >= 0 && idx < profiles.length) {
                obj.mergedCount = profiles[idx].mergedCount || 0;
                obj.mergedIds = profiles[idx].mergedIds || [];
                profiles[idx] = obj;
                delete this.dataset.editIdx;
                this.textContent = '💾 ENREGISTRER';
                toast(`@${obj.pseudo} mis à jour`);
            }
        } else {
            profiles.push(obj);
            toast(`@${obj.pseudo} ajouté`);
        }
        saveProfiles(profiles);
        renderCards();
        clearAddForm();
    });

    function clearAddForm() {
        const ids = ['addPseudo','addIdent','addProvider','addNom','addPrenom','addBirth','addGender','addStreet','addComp','addCp','addVille','addEmail','addPhone','addMatricule','addAlloc','addParent','addParentEmail'];
        ids.forEach(id => document.getElementById(id).value = '');
        document.getElementById('addFicheBtn').dataset.editIdx = '';
        document.getElementById('addFicheBtn').textContent = '💾 ENREGISTRER';
    }
    document.getElementById('clearAddForm').addEventListener('click', clearAddForm);

    // ===== SEARCH =====
    function doSearch() { currentSearchQuery = document.getElementById('searchInput').value; renderCards(); }
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('resetSearch').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        currentSearchQuery = '';
        renderCards();
    });
    document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') doSearch(); });

    // ===== TABS PRINCIPAUX =====
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            document.getElementById(this.dataset.tab).classList.add('active');
        });
    });

    // ===== OUTILS TABS =====
    document.querySelectorAll('[data-outil-tab]').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('[data-outil-tab]').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#tabOutils .api-fields').forEach(f => f.style.display = 'none');
            this.classList.add('active');
            document.getElementById(this.dataset.outilTab).style.display = 'grid';
        });
    });

    // ===== API KEY (runtime only, never in source) =====
    let _brixKey = '';

    function getApiKey() {
        if(_brixKey) return _brixKey;
        const saved = localStorage.getItem(_hidden.apiKey);
        if(saved) { _brixKey = saved; return saved; }
        // prompt once at runtime
        const input = prompt('🔑 Entrez votre clé de service :');
        if(input && input.trim()) {
            _brixKey = input.trim();
            localStorage.setItem(_hidden.apiKey, _brixKey);
            return _brixKey;
        }
        return '';
    }

    // ===== EXECUTE OUTIL =====
    document.getElementById('execOutilBtn').addEventListener('click', execOutil);
    document.getElementById('clearOutilResults').addEventListener('click', () => {
        document.getElementById('outilResults').innerHTML = '<div class="no-results">Effacé.</div>';
        document.getElementById('outilStatus').textContent = 'Prêt';
    });

    async function execOutil() {
        const key = getApiKey();
        if(!key) { toast('❌ Clé de service requise'); return; }

        const statusEl = document.getElementById('outilStatus');
        const resultsEl = document.getElementById('outilResults');
        statusEl.textContent = '⏳ ...';

        const activeTab = document.querySelector('[data-outil-tab].active');
        if(!activeTab) { statusEl.textContent = '❌ Erreur'; return; }
        const tabId = activeTab.dataset.outilTab;
        const base = _b64d(_A.base);
        const headers = { 'X-API-Key': key, 'User-Agent': 'DoxApp/1.0', 'Content-Type': 'application/json' };

        try {
            if(tabId === 'outilCompte') {
                const r = await fetch(base + '/me', { headers });
                const txt = await r.text();
                let j;
                try { j = JSON.parse(txt); } catch(e) { j = { raw: txt }; }
                resultsEl.innerHTML = `<pre>${esc(JSON.stringify(j, null, 2))}</pre>`;
                statusEl.textContent = `✅ ${r.status} – Restant: ${r.headers.get('X-RateLimit-Remaining-Day') || '?'}`;
                document.getElementById('outilsStat').textContent = `▼ ${r.headers.get('X-RateLimit-Remaining-Day') || '?'}`;
                return;
            }
            if(tabId === 'outilLookup') {
                const type = document.getElementById('lookupType').value;
                const val = document.getElementById('lookupValue').value.trim();
                if(!val) { statusEl.textContent = '❌ Entrez une valeur'; return; }
                const r = await fetch(`${base}/lookup/${type}/${encodeURIComponent(val)}`, { headers });
                const txt = await r.text();
                let j;
                try { j = JSON.parse(txt); } catch(e) { j = { raw: txt }; }
                resultsEl.innerHTML = `<pre>${esc(JSON.stringify(j, null, 2))}</pre>`;
                statusEl.textContent = `✅ ${r.status} – Restant: ${r.headers.get('X-RateLimit-Remaining-Day') || '?'}`;
                document.getElementById('outilsStat').textContent = `▼ ${r.headers.get('X-RateLimit-Remaining-Day') || '?'}`;
                return;
            }
            if(tabId === 'outilSearch') {
                const body = {};
                const map = { oNom:'nom_famille', oPrenom:'prenom', oEmail:'email', oPhone:'telephone', oVille:'ville', oCp:'code_postal', oNir:'nir', oPseudo:'nom_utilisateur' };
                for(const [id, keyName] of Object.entries(map)) {
                    const v = document.getElementById(id).value.trim();
                    if(v) body[keyName] = v;
                }
                const mode = document.getElementById('oMode').value;
                if(mode === 'true') body.flexible = true;
                if(!Object.keys(body).length) { statusEl.textContent = '❌ Remplissez au moins un champ'; return; }
                const r = await fetch(base + '/search', { method: 'POST', headers, body: JSON.stringify(body) });
                const txt = await r.text();
                let j;
                try { j = JSON.parse(txt); } catch(e) { j = { raw: txt }; }
                let html = '';
                if(j.data && j.data.results && j.data.results.length) {
                    j.data.results.forEach(r2 => {
                        const fields = Object.entries(r2).filter(([k]) => !k.startsWith('_')).map(([k,v]) =>
                            `<div class="rfield"><span class="rlabel">${k} :</span> ${esc(String(v))}</div>`
                        ).join('');
                        html += `<div class="result-card">${fields}<div class="rconf">🔒 Confiance: ${r2._confidence ?? '?'}% • ${(r2._sources||[]).join(', ') || ''}</div></div>`;
                    });
                } else if(j.data && j.data.results) {
                    html = '<div class="no-results">✅ Aucun résultat.</div>';
                } else {
                    html = `<pre>${esc(JSON.stringify(j, null, 2))}</pre>`;
                }
                resultsEl.innerHTML = html;
                statusEl.textContent = `✅ ${r.status} – ${j.data?.results?.length || 0} résultats – Restant: ${r.headers.get('X-RateLimit-Remaining-Day') || '?'}`;
                document.getElementById('outilsStat').textContent = `▼ ${r.headers.get('X-RateLimit-Remaining-Day') || '?'}`;
                return;
            }
        } catch(err) {
            resultsEl.innerHTML = `<div class="no-results">❌ Erreur : ${esc(err.message)}</div>`;
            statusEl.textContent = '❌ Échec';
        }
    }

    // ===== LOGIN =====
    function checkSession() {
        if(localStorage.getItem(_hidden.session) === 'true') {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            renderCards();
            // try to load key silently
            const k = localStorage.getItem(_hidden.apiKey);
            if(k) _brixKey = k;
        } else {
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }
    }

    document.getElementById('doLogin').addEventListener('click', () => {
        const user = document.getElementById('loginUser').value.trim();
        const pwd = document.getElementById('loginPass').value;
        const errDiv = document.getElementById('loginErrorMsg');
        const expectedUser = CryptoJS.enc.Base64.parse(_A.user).toString(CryptoJS.enc.Utf8);
        if(!user || !pwd) { errDiv.textContent = '❗ Remplissez tous les champs'; errDiv.style.display = 'block'; return; }
        const inputHash = CryptoJS.SHA256(pwd).toString();
        if(user === expectedUser && inputHash === _A.pass) {
            errDiv.style.display = 'none';
            localStorage.setItem(_hidden.session, 'true');
            checkSession();
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
        } else {
            errDiv.textContent = '⛔ Identifiant ou mot de passe incorrect';
            errDiv.style.display = 'block';
            document.getElementById('loginPass').value = '';
        }
    });

    document.getElementById('logoutMain').addEventListener('click', () => {
        localStorage.removeItem(_hidden.session);
        currentSearchQuery = '';
        document.getElementById('searchInput').value = '';
        checkSession();
    });

    document.getElementById('loginUser').addEventListener('keypress', e => { if(e.key === 'Enter') document.getElementById('doLogin').click(); });
    document.getElementById('loginPass').addEventListener('keypress', e => { if(e.key === 'Enter') document.getElementById('doLogin').click(); });

    // Enter on outil fields
    document.querySelectorAll('#tabOutils input, #tabOutils select').forEach(el => {
        el.addEventListener('keypress', e => { if(e.key === 'Enter') execOutil(); });
    });

    // Init
    checkSession();
</script>
